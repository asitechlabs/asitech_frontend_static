<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 250px;
      height: 100vh;
      background: #1e293b;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
    }

    .sidebar h1 {
      font-size: 24px;
      color: #6366f1;
      margin-bottom: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      padding: 12px 15px;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .nav-links a:hover, .nav-links a.active {
      background: #334155;
      color: white;
    }

    .logout-btn {
      margin-top: auto;
      background: #dc2626;
      color: white;
      border: none;
      padding: 12px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    .logout-btn:hover {
      background: #b91c1c;
    }

    .main {
      margin-left: 250px;
      padding: 30px 40px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .header h2 {
      font-size: 28px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      padding: 25px;
      border-radius: 15px;
      border: 1px solid #334155;
    }

    .stat-card h3 {
      color: #64748b;
      font-size: 14px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: bold;
      color: #6366f1;
    }

    .messages-container {
      background: #1e293b;
      border-radius: 15px;
      padding: 25px;
      border: 1px solid #334155;
    }

    .messages-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .messages-header h3 {
      font-size: 20px;
    }

    .refresh-btn {
      background: #6366f1;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    .refresh-btn:hover {
      background: #4f46e5;
    }

    .message-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message-item {
      background: #0f172a;
      border-radius: 12px;
      padding: 20px;
      border-left: 4px solid #6366f1;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .message-item:hover {
      transform: translateX(5px);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
    }

    .message-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .message-name {
      font-size: 18px;
      font-weight: 600;
      color: white;
    }

    .message-email {
      color: #6366f1;
      font-size: 14px;
      margin-top: 4px;
    }

    .message-date {
      color: #64748b;
      font-size: 12px;
    }

    .message-content {
      color: #cbd5e1;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .message-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .delete-btn {
      background: #dc2626;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .delete-btn:hover {
      background: #b91c1c;
      transform: translateY(-1px);
    }

    .delete-btn:disabled {
      background: #475569;
      cursor: not-allowed;
      transform: none;
    }

    .delete-btn svg {
      width: 16px;
      height: 16px;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 15px 25px;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      z-index: 2000;
      animation: slideIn 0.3s ease;
    }

    .toast.success {
      background: #10b981;
    }

    .toast.error {
      background: #ef4444;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .confirm-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1500;
    }

    .confirm-card {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      max-width: 400px;
      border: 1px solid #334155;
    }

    .confirm-card h3 {
      margin-bottom: 15px;
      color: white;
    }

    .confirm-card p {
      color: #94a3b8;
      margin-bottom: 25px;
    }

    .confirm-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .confirm-actions button {
      padding: 10px 25px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .confirm-cancel {
      background: #334155;
      color: white;
      border: none;
    }

    .confirm-cancel:hover {
      background: #475569;
    }

    .confirm-delete {
      background: #dc2626;
      color: white;
      border: none;
    }

    .confirm-delete:hover {
      background: #b91c1c;
    }

    .confirm-delete:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: #6366f1;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #334155;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* LOGIN FORM */
    .login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .login-card {
      background: #1e293b;
      padding: 40px;
      border-radius: 15px;
      width: 400px;
      border: 1px solid #334155;
      text-align: center;
    }

    .login-card h2 {
      margin-bottom: 30px;
      color: #6366f1;
    }

    .login-card input {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 15px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: white;
      font-size: 14px;
    }

    .login-card input:focus {
      outline: none;
      border-color: #6366f1;
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .login-card button:hover {
      background: #4f46e5;
    }

    .login-card button:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .error-msg {
      color: #ef4444;
      margin-top: 15px;
      font-size: 14px;
    }

    .hidden {
      display: none !important;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
      }

      .sidebar h1 {
        margin-bottom: 0;
        font-size: 18px;
      }

      .sidebar h1 svg {
        display: none;
      }

      .nav-links {
        flex-direction: row;
        gap: 15px;
      }

      .nav-links a {
        padding: 8px 12px;
        font-size: 13px;
      }

      .logout-btn {
        margin-top: 0;
        padding: 8px 12px;
        font-size: 13px;
      }

      .main {
        margin-left: 0;
        padding: 20px;
      }

      .header h2 {
        font-size: 22px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .message-item {
        padding: 15px;
      }

      .message-top {
        flex-direction: column;
        gap: 10px;
      }

      .message-name {
        font-size: 16px;
      }

      .message-date {
        align-self: flex-start;
      }

      .login-card {
        width: 90%;
        padding: 30px 20px;
      }

      .toast {
        left: 20px;
        right: 20px;
        bottom: 20px;
      }

      .confirm-card {
        width: 90%;
        margin: 0 20px;
      }
    }
  </style>
</head>
<body>
  <!-- LOGIN FORM -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <h2>Admin Login</h2>
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="loginBtn">Login</button>
      </form>
      <p class="error-msg hidden" id="loginError"></p>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="sidebar hidden" id="sidebar">
    <h1>
      <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
      </svg>
      Admin Panel
    </h1>
    <nav class="nav-links">
      <a href="#" class="active">Dashboard</a>
      <a href="/">Home Page</a>
    </nav>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="main hidden" id="mainContent">
    <div class="header">
      <h2>Messages</h2>
    </div>

    <div class="stats">
      <div class="stat-card">
        <h3>Total Messages</h3>
        <div class="value" id="totalCount">0</div>
      </div>
    </div>

    <div class="messages-container">
      <div class="messages-header">
        <h3>All Messages</h3>
        <button class="refresh-btn" onclick="loadMessages()">Refresh</button>
      </div>
      <div class="message-list" id="messageList">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading messages...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const loginOverlay = document.getElementById('loginOverlay');
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    function getToken() {
      return localStorage.getItem('adminToken');
    }

    function setToken(token) {
      localStorage.setItem('adminToken', token);
    }

    function logout() {
      localStorage.removeItem('adminToken');
      loginOverlay.classList.remove('hidden');
      sidebar.classList.add('hidden');
      mainContent.classList.add('hidden');
    }

    function checkAuth() {
      const token = getToken();
      if (token) {
        loginOverlay.classList.add('hidden');
        sidebar.classList.remove('hidden');
        mainContent.classList.remove('hidden');
        loadMessages();
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.classList.add('hidden');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('http://localhost:3000/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          setToken(data.token);
          loginOverlay.classList.add('hidden');
          sidebar.classList.remove('hidden');
          mainContent.classList.remove('hidden');
          loadMessages();
        } else {
          loginError.textContent = data.message || 'Login failed';
          loginError.classList.remove('hidden');
        }
      } catch (err) {
        loginError.textContent = 'Connection error';
        loginError.classList.remove('hidden');
      }

      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    });

    async function getMessages() {
      try {
        const token = getToken();
        const res = await fetch("http://localhost:3000/api/admin/messages", {
          method: "GET",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
        });

        if (res.status === 401) {
          logout();
          return [];
        }

        const data = await res.json();
        return data;
      } catch (err) {
        console.error("Error fetching messages:", err);
        return [];
      }
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function renderMessages(messages) {
      const container = document.getElementById('messageList');
      const totalCount = document.getElementById('totalCount');
      
      totalCount.textContent = messages.length || 0;

      if (!messages || messages.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
            <h3>No messages yet</h3>
            <p>Messages from your contact form will appear here.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = messages.map(msg => `
        <div class="message-item" id="msg-${msg._id}">
          <div class="message-top">
            <div>
              <div class="message-name">${msg.name}</div>
              <div class="message-email">${msg.email}</div>
            </div>
            <div class="message-date">${formatDate(msg.createdAt)}</div>
          </div>
          <div class="message-content">${msg.message}</div>
          <div class="message-actions">
            <button class="delete-btn" onclick="confirmDelete('${msg._id}', '${msg.name}')">
              <svg fill="currentColor" viewBox="0 0 24 24">
                <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
              </svg>
              Delete
            </button>
          </div>
        </div>
      `).join('');
    }

    async function loadMessages() {
      const container = document.getElementById('messageList');
      container.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading messages...</p>
        </div>
      `;

      const messages = await getMessages();
      renderMessages(messages);
    }

    function showToast(message, type = 'success') {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => toast.remove(), 3000);
    }

    function confirmDelete(id, name) {
      const overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.id = 'confirmOverlay';
      overlay.innerHTML = `
        <div class="confirm-card">
          <h3>Delete Message?</h3>
          <p>Are you sure you want to delete the message from <strong>${name}</strong>? This action cannot be undone.</p>
          <div class="confirm-actions">
            <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
            <button class="confirm-delete" id="confirmDeleteBtn" onclick="deleteMessage('${id}')">Delete</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    function closeConfirm() {
      const overlay = document.getElementById('confirmOverlay');
      if (overlay) overlay.remove();
    }

    async function deleteMessage(id) {
      const deleteBtn = document.getElementById('confirmDeleteBtn');
      deleteBtn.disabled = true;
      deleteBtn.textContent = 'Deleting...';

      try {
        const token = getToken();
        const res = await fetch(`http://localhost:3000/api/admin/messages/${id}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          }
        });

        if (res.ok) {
          closeConfirm();
          showToast('Message deleted successfully', 'success');
          
          const msgElement = document.getElementById(`msg-${id}`);
          if (msgElement) {
            msgElement.style.opacity = '0';
            msgElement.style.transform = 'translateX(100%)';
            msgElement.style.transition = 'all 0.3s ease';
            setTimeout(() => {
              msgElement.remove();
              updateCount();
            }, 300);
          }
        } else {
          showToast('Failed to delete message', 'error');
          deleteBtn.disabled = false;
          deleteBtn.textContent = 'Delete';
        }
      } catch (err) {
        showToast('Connection error', 'error');
        deleteBtn.disabled = false;
        deleteBtn.textContent = 'Delete';
      }
    }

    function updateCount() {
      const remaining = document.querySelectorAll('.message-item').length;
      document.getElementById('totalCount').textContent = remaining;

      if (remaining === 0) {
        document.getElementById('messageList').innerHTML = `
          <div class="empty-state">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
            <h3>No messages yet</h3>
            <p>Messages from your contact form will appear here.</p>
          </div>
        `;
      }
    }

    checkAuth();
  </script>
</body>
</html>
